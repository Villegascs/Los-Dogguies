<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Dogguies | Perros Calientes Premium</title>
    <meta name="description" content="Los mejores perros calientes de la ciudad. Arma tu carrito de comida y disfruta de Los Dogguies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Navbar / Header -->
    <header class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Los Dogguies Logo" class="logo">
        </div>
        <div class="cart-icon-container" id="cart-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <!-- Hero Section with Carousel -->
    <section class="hero">
        <div class="carousel-wrapper">
            <div class="carousel-track">
                <!-- Duplicated for infinite scroll -->
                <img src="assets/classic.png" alt="Hot Dog Clásico" class="carousel-image">
                <img src="assets/mexican.png" alt="Hot Dog Mexicano" class="carousel-image">
                <img src="assets/special.png" alt="Hot Dog Especial" class="carousel-image">
                <img src="assets/classic.png" alt="Hot Dog Clásico" class="carousel-image">
                <img src="assets/mexican.png" alt="Hot Dog Mexicano" class="carousel-image">
                <img src="assets/special.png" alt="Hot Dog Especial" class="carousel-image">
            </div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">El Sabor que <br><span class="highlight">Te Mueve</span></h1>
            <button id="scroll-to-menu" class="btn-primary">Ver Menú</button>
        </div>
    </section>

    <!-- Menu Section -->
    <section id="menu-section" class="menu-section">
        <div class="container">
            <h2 class="section-title">Nuestro Menú</h2>
            <div class="menu-grid" id="menu-grid-container">
                <!-- Los productos se inyectarán aquí mediante JS desde db.js -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Pedido</h2>
            <button class="close-cart" id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Items will be injected here via JS -->
            <p class="empty-cart-msg">Tu carrito está vacío.</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-checkout">Completar Pedido</button>
        </div>
    </aside>

    <!-- Checkout Modal -->
    <div class="checkout-modal-overlay" id="checkout-modal">
        <div class="checkout-modal">
            <div class="modal-header">
                <h2>Completar Pedido</h2>
                <button class="close-modal" id="close-checkout">&times;</button>
            </div>
            <form id="checkout-form" class="checkout-form">
                <h3>Datos Personales</h3>
                <div class="form-group row">
                    <input type="text" id="nombre" placeholder="Nombre" required>
                    <input type="text" id="apellido" placeholder="Apellido" required>
                </div>
                <div class="form-group row">
                    <div class="input-group">
                        <select id="nacionalidad" class="select-nacionalidad">
                            <option value="V">V</option>
                            <option value="E">E</option>
                            <option value="J">J</option>
                            <option value="P">P</option>
                        </select>
                        <input type="text" id="cedula" placeholder="Cédula" inputmode="numeric" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    </div>
                    <input type="text" id="telefono" placeholder="Teléfono" inputmode="numeric" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>

                <h3>Método de Pago</h3>
                <div class="form-group">
                    <select id="metodo-pago" required>
                        <option value="" disabled selected>Seleccione un método</option>
                        <option value="efectivo">Efectivo</option>
                        <option value="pago-movil">Pago Móvil</option>
                    </select>
                </div>

                <!-- Efectivo Fields -->
                <div id="pago-efectivo-fields" class="payment-fields hidden">
                    <div class="form-group">
                        <label for="denominacion">¿Con qué billete va a pagar?</label>
                        <input type="number" id="denominacion" placeholder="Ej. 20, 50, 100">
                    </div>
                </div>

                <!-- Pago Movil Fields -->
                <div id="pago-movil-fields" class="payment-fields hidden">
                    <div class="form-group">
                        <label for="banco-origen">Banco Emisor del Pago</label>
                        <select id="banco-origen">
                            <option value="" disabled selected>Seleccione el banco</option>
                            <option value="0102">Banco de Venezuela (0102)</option>
                            <option value="0104">Venezolano de Crédito (0104)</option>
                            <option value="0105">Mercantil (0105)</option>
                            <option value="0108">Provincial (0108)</option>
                            <option value="0114">Bancaribe (0114)</option>
                            <option value="0115">Exterior (0115)</option>
                            <option value="0134">Banesco (0134)</option>
                            <option value="0138">Plaza (0138)</option>
                            <option value="0151">BFC (0151)</option>
                            <option value="0156">100% Banco (0156)</option>
                            <option value="0157">Del Sur (0157)</option>
                            <option value="0163">Tesoro (0163)</option>
                            <option value="0166">Agrícola (0166)</option>
                            <option value="0168">Bancrecer (0168)</option>
                            <option value="0169">Mi Banco (0169)</option>
                            <option value="0171">Activo (0171)</option>
                            <option value="0172">Bancamiga (0172)</option>
                            <option value="0174">Banplus (0174)</option>
                            <option value="0175">Bicentenario (0175)</option>
                            <option value="0177">Banfanb (0177)</option>
                            <option value="0191">BNC (0191)</option>
                        </select>
                    </div>
                    <div class="form-group row">
                        <div class="input-group">
                            <select id="pm-nacionalidad" class="select-nacionalidad">
                                <option value="V">V</option>
                                <option value="E">E</option>
                                <option value="J">J</option>
                                <option value="P">P</option>
                            </select>
                            <input type="text" id="pm-cedula" placeholder="Cédula del titular" inputmode="numeric" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <input type="text" id="pm-telefono" placeholder="Número asociado al banco" inputmode="numeric" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="form-group">
                        <input type="text" id="pm-referencia" placeholder="Referencia (últimos 6 dígitos)" maxlength="6" inputmode="numeric" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-submit-order">Enviar Pedido</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
